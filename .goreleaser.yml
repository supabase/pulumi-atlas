version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: pulumi-resource-atlas
    main: ./cmd/pulumi-resource-atlas
    binary: pulumi-resource-atlas
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/supabase/pulumi-atlas/provider.Version={{.Version}}

archives:
  - id: pulumi-resource-atlas
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
