name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Release
    runs-on: ubuntu-latest
    env:
      GOWORK: off
      GOPRIVATE: github.com/supabase/*
      GONOSUMDB: github.com/supabase/*

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.ATLASCTL_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
