name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]



jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      GOWORK: off

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./provider/...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: ./provider/...

      - name: Build
        run: make build
