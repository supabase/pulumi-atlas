name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]



jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      GOWORK: off
      GOPRIVATE: github.com/supabase/*
      GONOSUMDB: github.com/supabase/*

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private Go modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.ATLASCTL_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./provider/...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: ./provider/...

      - name: Build
        run: make build
